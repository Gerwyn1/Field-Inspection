spring.application.name=backend

# --- Database: H2 in-memory (throwaway dev DB) ---
# Fixed name "fieldinspect" + DB_CLOSE_DELAY=-1 keeps the DB alive for the whole
# app run, so the H2 web console can connect to the SAME database our app uses.
spring.datasource.url=jdbc:h2:mem:fieldinspect;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# --- JPA / Hibernate (the ORM) ---
# ddl-auto=update: let Hibernate create/update tables from our @Entity classes.
spring.jpa.hibernate.ddl-auto=update
# Silence a startup warning; we don't want DB sessions held open during JSON rendering.
spring.jpa.open-in-view=false

# --- H2 web console at http://localhost:8080/h2-console ---
spring.h2.console.enabled=true

spring.jpa.show-sql=true

# --- JWT (like JWT_SECRET in a .env file) ---
# The secret signs every token (HS256). It must be >= 32 bytes or jjwt refuses it.
# Fine to commit for local H2 dev; in production this comes from an environment
# variable instead: app.jwt.secret=${JWT_SECRET}
app.jwt.secret=dev-only-secret-change-me-in-production-0123456789abcdef0123456789
app.jwt.expiration-minutes=60