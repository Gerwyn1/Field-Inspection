spring.application.name=backend

# --- Database: MS SQL Server (in Docker — see docker-compose.yml) ---
# Unlike the old in-memory H2, this database PERSISTS between restarts.
# encrypt=true + trustServerCertificate=true: the container uses a self-signed
# TLS cert, so we tell the driver to accept it (dev-only; prod uses a real cert).
# The test suite does NOT use this — see src/test/resources/application-test.properties.
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=fieldinspect;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=FieldInspect!2026
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# --- JPA / Hibernate (the ORM) ---
# ddl-auto=update: let Hibernate create/update tables from our @Entity classes.
spring.jpa.hibernate.ddl-auto=update
# Silence a startup warning; we don't want DB sessions held open during JSON rendering.
spring.jpa.open-in-view=false

spring.jpa.show-sql=true

# --- JWT (like JWT_SECRET in a .env file) ---
# The secret signs every token (HS256). It must be >= 32 bytes or jjwt refuses it.
# Fine to commit for local H2 dev; in production this comes from an environment
# variable instead: app.jwt.secret=${JWT_SECRET}
app.jwt.secret=dev-only-secret-change-me-in-production-0123456789abcdef0123456789
app.jwt.expiration-minutes=60