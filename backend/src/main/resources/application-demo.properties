# Loaded ONLY when SPRING_PROFILES_ACTIVE=demo (the Hugging Face Space sets
# this in its Dockerfile). Same merge rules as the test profile: this file
# overrides application.properties key-by-key, everything else still applies.
#
# The demo runs on in-memory H2 because a free cloud Space can't host SQL
# Server. Data resets on every restart — which for a public demo seeded with
# fake data is a feature, not a bug: nobody can leave junk behind.
spring.datasource.url=jdbc:h2:mem:fieldinspect-demo;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hugging Face routes public traffic to the port declared in the Space README
# (app_port). ${PORT:7860} = "use the PORT env var, else 7860" — the same
# ${VAR:-default} idiom as a shell script or dotenv.
server.port=${PORT:7860}

# Never ship the committed dev secret: read JWT_SECRET from the environment
# (set as a private "Secret" in the Space settings). The fallback keeps the
# demo bootable before the secret is configured.
app.jwt.secret=${JWT_SECRET:demo-fallback-secret-rotate-me-0123456789abcdef0123456789abcdef}

# Quieter logs for a public deployment.
spring.jpa.show-sql=false
