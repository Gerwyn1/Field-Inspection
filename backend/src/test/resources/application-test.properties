# Loaded ONLY when the "test" profile is active (our test classes declare
# @ActiveProfiles("test")). Profile files MERGE over application.properties —
# we override just the datasource, everything else (JWT config, JPA settings)
# still comes from the base file.
#
# Tests run on in-memory H2: fast, isolated, no Docker required. The schema is
# rebuilt from the @Entity classes on every run, so tests never depend on — or
# pollute — the real SQL Server data.
spring.datasource.url=jdbc:h2:mem:fieldinspect-test;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
